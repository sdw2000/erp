<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试销售订单 API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        .section {
            margin-bottom: 30px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        h2 {
            color: #333;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        pre {
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            max-height: 500px;
        }
        .success {
            color: green;
            font-weight: bold;
        }
        .error {
            color: red;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>销售订单 API 测试</h1>
    
    <div class="section">
        <h2>1. 测试 API 连接</h2>
        <button onclick="testConnection()">测试连接到后端</button>
        <div id="connectionResult"></div>
    </div>

    <div class="section">
        <h2>2. 获取订单列表</h2>
        <button onclick="fetchOrders()">获取订单</button>
        <div id="ordersResult"></div>
        <div id="ordersTable"></div>
    </div>

    <div class="section">
        <h2>3. 原始响应数据</h2>
        <pre id="rawData">点击"获取订单"按钮查看原始数据</pre>
    </div>

    <script>
        const BASE_URL = 'http://localhost:8090';
        
        // 从 localStorage 获取 token
        function getToken() {
            const token = localStorage.getItem('token');
            if (!token) {
                alert('未找到 token，请先登录系统！');
                return null;
            }
            return token;
        }

        async function testConnection() {
            const resultDiv = document.getElementById('connectionResult');
            resultDiv.innerHTML = '<p>正在测试连接...</p>';
            
            const token = getToken();
            if (!token) {
                resultDiv.innerHTML = '<p class="error">❌ 未找到登录 token</p>';
                return;
            }

            try {
                const response = await fetch(`${BASE_URL}/sales/orders`, {
                    method: 'GET',
                    headers: {
                        'Authorization': token,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    resultDiv.innerHTML = `
                        <p class="success">✅ 连接成功！</p>
                        <p>状态码: ${response.status}</p>
                        <p>URL: ${BASE_URL}/sales/orders</p>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <p class="error">❌ 连接失败</p>
                        <p>状态码: ${response.status}</p>
                        <p>状态文本: ${response.statusText}</p>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <p class="error">❌ 连接错误</p>
                    <p>错误信息: ${error.message}</p>
                `;
            }
        }

        async function fetchOrders() {
            const resultDiv = document.getElementById('ordersResult');
            const tableDiv = document.getElementById('ordersTable');
            const rawDataDiv = document.getElementById('rawData');
            
            resultDiv.innerHTML = '<p>正在获取订单...</p>';
            tableDiv.innerHTML = '';
            
            const token = getToken();
            if (!token) {
                resultDiv.innerHTML = '<p class="error">❌ 未找到登录 token</p>';
                return;
            }

            try {
                const response = await fetch(`${BASE_URL}/sales/orders`, {
                    method: 'GET',
                    headers: {
                        'Authorization': token,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                
                // 显示原始数据
                rawDataDiv.textContent = JSON.stringify(data, null, 2);

                console.log('=== API 测试结果 ===');
                console.log('响应数据:', data);
                console.log('data.code:', data.code);
                console.log('data.data:', data.data);
                console.log('data.data.data:', data.data ? data.data.data : undefined);
                
                if (data.code === 200 && data.data && data.data.data) {
                    const orders = data.data.data;
                    
                    resultDiv.innerHTML = `
                        <p class="success">✅ 获取成功！</p>
                        <p>订单数量: ${orders.length}</p>
                        <p>响应码: ${data.code}</p>
                        <p>响应消息: ${data.msg}</p>
                    `;

                    if (orders.length > 0) {
                        let tableHTML = `
                            <table>
                                <thead>
                                    <tr>
                                        <th>订单号</th>
                                        <th>客户</th>
                                        <th>总金额</th>
                                        <th>总面积</th>
                                        <th>下单日期</th>
                                        <th>交货日期</th>
                                        <th>明细数量</th>
                                    </tr>
                                </thead>
                                <tbody>
                        `;

                        orders.forEach(order => {
                            tableHTML += `
                                <tr>
                                    <td>${order.orderNo || '-'}</td>
                                    <td>${order.customer || '-'}</td>
                                    <td>${order.totalAmount || 0}</td>
                                    <td>${order.totalArea || 0}</td>
                                    <td>${order.orderDate || '-'}</td>
                                    <td>${order.deliveryDate || '-'}</td>
                                    <td>${order.items ? order.items.length : 0}</td>
                                </tr>
                            `;
                        });

                        tableHTML += `
                                </tbody>
                            </table>
                        `;
                        
                        tableDiv.innerHTML = tableHTML;
                    } else {
                        tableDiv.innerHTML = '<p>暂无订单数据</p>';
                    }
                } else {
                    resultDiv.innerHTML = `
                        <p class="error">❌ 获取失败</p>
                        <p>响应码: ${data.code}</p>
                        <p>响应消息: ${data.msg || '未知错误'}</p>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <p class="error">❌ 请求错误</p>
                    <p>错误信息: ${error.message}</p>
                `;
                console.error('请求异常:', error);
            }
        }

        // 页面加载时显示 token 状态
        window.onload = function() {
            const token = localStorage.getItem('token');
            if (token) {
                console.log('找到 token:', token.substring(0, 20) + '...');
            } else {
                console.warn('未找到 token，请先登录！');
                alert('未找到登录 token，请先在主系统中登录！');
            }
        };
    </script>
</body>
</html>
